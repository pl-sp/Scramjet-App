<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员面板 | Scramjet</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #1a1a1f;
            --text-color: #e0e0e0;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --error-color: #ff4d4d;
            --input-bg: #25252b;
            --border-color: #33333a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            overflow-y: auto;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(120px);
            opacity: 0.1;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .login-container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #aaa;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #message {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--error-color);
            min-height: 1.2rem;
            visibility: hidden;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Scramjet 管理员面板</h1>
        <p>添加新用户</p>

        <div class="form-group">
            <label for="user">用户名</label>
            <input type="text" id="user" placeholder="输入新用户名" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="pass">密码</label>
            <input type="password" id="pass" placeholder="输入新用户密码">
        </div>

        <div class="form-group">
            <label for="role">角色</label>
            <select id="role">
                <option value="user">普通用户 (User)</option>
                <option value="admin">管理员 (Admin)</option>
            </select>
        </div>

        <button id="addBtn">添加用户</button>
        
        <div id="message"></div>

        <hr style="border: 1px solid var(--border-color); margin: 1.5rem 0;">
        <div style="text-align: left;">
            <h3 style="font-size: 1.1rem; margin-bottom: 1rem; color: #ccc;">账户列表</h3>
            <ul id="usersList" style="list-style: none; padding: 0; max-height: 200px; overflow-y: auto;">
                <li style="text-align: center; color: #888; font-size: 0.85rem;">加载中...</li>
            </ul>
        </div>

        <div class="footer">
            <a href="/">&larr; 返回主页</a>
            <a id="logoutLink" href="#" style="color: var(--error-color); cursor: pointer;">注销</a>
            <span>Powered by Scramjet</span>
        </div>
    </div>

    <!-- 自定义模态框载体 -->
    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="text-align: center;">
            <h3 id="modalTitle">标题</h3>
            <p id="modalDesc" style="margin-bottom: 1rem; color: #aaa; font-size: 0.9rem;"></p>
            <div id="modalBody" style="text-align: left;"></div>
            <div class="modal-buttons" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem;">
                <button id="modalCancelBtn" class="action-btn edit-btn" style="width: auto; padding: 8px 16px;">取消</button>
                <button id="modalConfirmBtn" style="width: auto; padding: 8px 16px; background-color: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer;"></button>
            </div>
        </div>
    </div>

    <script>
        const addBtn = document.getElementById('addBtn');
        const userInp = document.getElementById('user');
        const passInp = document.getElementById('pass');
        const roleSel = document.getElementById('role');
        const msg = document.getElementById('message');

        async function loadUsers(currentUser) {
            try {
                const res = await fetch('/api/users');
                if (!res.ok) return;
                const data = await res.json();
                if (data.success && data.users) {
                    const list = document.getElementById('usersList');
                    list.innerHTML = '';
                    data.users.forEach(u => {
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        const roleClass = u.role === 'admin' ? 'role-admin' : 'role-user';
                        const roleName = u.role === 'admin' ? '管理员' : '普通用户';

                        let actionsHtml = '';
                        const canDelete = u.user !== 'admin';
                        const canEdit = u.user !== 'admin' || currentUser === 'admin';

                        if (canEdit || canDelete) {
                            actionsHtml += '<div class="user-actions">';
                            if (canEdit) actionsHtml += `<button class="action-btn edit-btn" onclick="editUser('${u.user}', '${u.role}')">编辑</button>`;
                            if (canDelete) actionsHtml += `<button class="action-btn delete-btn" onclick="deleteUser('${u.user}')">删除</button>`;
                            actionsHtml += '</div>';
                        }

                        li.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span style="font-weight: 500;">${u.user}</span>
                                <span class="user-role ${roleClass}">${roleName}</span>
                            </div>
                            ${actionsHtml}
                        `;
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("加载用户列表失败:", err);
            }
        }

        function showModal(options) {
            return new Promise((resolve) => {
                const modal = document.getElementById('customModal');
                document.getElementById('modalTitle').innerText = options.title;
                document.getElementById('modalDesc').innerText = options.desc || '';
                document.getElementById('modalBody').innerHTML = options.bodyHtml || '';
                
                const cancelBtn = document.getElementById('modalCancelBtn');
                const confirmBtn = document.getElementById('modalConfirmBtn');
                
                cancelBtn.innerText = options.cancelText || '取消';
                confirmBtn.innerText = options.confirmText || '确定';
                
                if (options.confirmColor) {
                    confirmBtn.style.backgroundColor = options.confirmColor;
                } else {
                    confirmBtn.style.backgroundColor = 'var(--accent-color)';
                }
                
                const close = (result) => {
                    modal.style.display = 'none';
                    cancelBtn.onclick = null;
                    confirmBtn.onclick = null;
                    resolve(result);
                };
                
                cancelBtn.onclick = () => close(null);
                confirmBtn.onclick = () => {
                    if (options.onConfirm) {
                        const res = options.onConfirm();
                        if (res !== false) close(res);
                    } else {
                        close(true);
                    }
                };
                
                modal.style.display = 'flex';
                
                const firstInput = modal.querySelector('input, select');
                if (firstInput) firstInput.focus();
            });
        }

        async function deleteUser(username) {
            const result = await showModal({
                title: '确认删除',
                desc: `确定要永久删除用户 ${username} 吗？此操作无法撤销。`,
                confirmText: '确认删除',
                confirmColor: 'var(--error-color)',
                onConfirm: () => true
            });

            if (!result) return;
            
            try {
                const res = await fetch(`/api/users/${username}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    showMsg(`用户 ${username} 已删除`, true);
                    window.location.reload();
                } else {
                    showMsg(data.message || '删除失败', false);
                }
            } catch (err) {
                showMsg('网络错误，请稍后再试', false);
            }
        }

        async function editUser(username, currentRole) {
            const bodyHtml = `
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label for="editPassInp" style="font-size: 0.75rem;">修改密码 (留空表示不修改)</label>
                    <input type="text" id="editPassInp" placeholder="输入新密码" style="margin-top: 4px;" autocomplete="off">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="editRoleSel" style="font-size: 0.75rem;">角色</label>
                    <select id="editRoleSel" style="margin-top: 4px;">
                        <option value="user" ${currentRole === 'user' ? 'selected' : ''}>普通用户 (User)</option>
                        <option value="admin" ${currentRole === 'admin' ? 'selected' : ''}>管理员 (Admin)</option>
                    </select>
                </div>
            `;

            const result = await showModal({
                title: `编辑用户: ${username}`,
                bodyHtml: bodyHtml,
                confirmText: '保存修改',
                onConfirm: () => {
                    return {
                        newPass: document.getElementById('editPassInp').value,
                        newRole: document.getElementById('editRoleSel').value
                    };
                }
            });

            if (!result) return;
            
            const payload = {};
            if (result.newPass.trim() !== '') payload.pass = result.newPass;
            if (result.newRole !== currentRole) payload.role = result.newRole;

            if (Object.keys(payload).length === 0) {
                showMsg('没有修改任何内容', false);
                return;
            }

            try {
                const res = await fetch(`/api/users/${username}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showMsg(`用户 ${username} 修改成功`, true);
                    window.location.reload();
                } else {
                    showMsg(data.message || '修改失败', false);
                }
            } catch (err) {
                showMsg('网络错误，请稍后再试', false);
            }
        }

        // Check if user is actually admin
        fetch('/api/me').then(res => {
            if (!res.ok) window.location.href = '/login.html';
            return res.json();
        }).then(data => {
            if (data.role !== 'admin') {
                document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:20vh;"><h2>403 Forbidden</h2><p>You do not have permission to view this page.</p></div>';
            } else {
                loadUsers(data.user);
            }
        }).catch(err => {
            window.location.href = '/login.html';
        });

        async function handleAddUser() {
            const user = userInp.value;
            const pass = passInp.value;
            const role = roleSel.value;

            if (!user || !pass) {
                showMsg("请填写完整信息", false);
                return;
            }

            addBtn.innerText = "添加中...";
            addBtn.disabled = true;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass, role })
                });

                if (response.ok) {
                    showMsg("用户添加成功！", true);
                    userInp.value = '';
                    passInp.value = '';
                    window.location.reload();
                } else if (response.status === 409) {
                    showMsg("用户名已存在", false);
                } else {
                    const data = await response.json();
                    showMsg(data.message || "添加失败", false);
                }
            } catch (err) {
                showMsg("网络错误，请稍后再试", false);
            } finally {
                addBtn.innerText = "添加用户";
                addBtn.disabled = false;
            }
        }

        function showMsg(text, isSuccess) {
            msg.style.color = isSuccess ? '#4ade80' : 'var(--error-color)';
            msg.innerText = text;
            msg.style.visibility = 'visible';
            
            if (!isSuccess) {
                document.querySelector('.login-container').style.animation = 'none';
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = 'shake 0.3s';
                }, 10);
            } else {
                setTimeout(() => {
                    msg.style.visibility = 'hidden';
                }, 3000);
            }
        }

        addBtn.addEventListener('click', handleAddUser);

        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (err) {
                console.error('Logout failed:', err);
            }
        });
    </script>

    <style>
        .user-item {
            background-color: var(--input-bg);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .user-actions {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            width: auto;
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 5px;
            background-color: transparent;
            border: 1px solid currentColor;
            cursor: pointer;
            transition: all 0.2s;
        }
        .edit-btn { color: #aaa; border-color: #555; }
        .edit-btn:hover { background-color: rgba(255, 255, 255, 0.1); color: #fff; border-color: #888; }
        .delete-btn { color: var(--error-color); border-color: var(--error-color); }
        .delete-btn:hover { background-color: rgba(255, 77, 77, 0.1); }
        
        .user-role {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #333;
            color: #aaa;
        }
        .role-admin { background-color: rgba(88, 101, 242, 0.2); color: var(--accent-color); }
        .role-user { background-color: rgba(74, 222, 128, 0.2); color: #4ade80; }
        
        #usersList::-webkit-scrollbar { width: 6px; }
        #usersList::-webkit-scrollbar-thumb { background-color: #444; border-radius: 3px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
            animation: fadeIn 0.15s ease-out;
        }
        .modal-content {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            width: 90%; max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            animation: slideUp 0.15s ease-out;
        }
        .modal-content h3 { margin-bottom: 0.5rem; font-size: 1.25rem; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</body>
</html>
