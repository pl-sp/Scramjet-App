<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录日志 | Scramjet</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #1a1a1f;
            --text-color: #e0e0e0;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --error-color: #ff4d4d;
            --input-bg: #25252b;
            --border-color: #33333a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-color); display: flex;
            justify-content: center; align-items: center; min-height: 100vh; padding: 2rem 1rem;
            overflow-y: auto; overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; width: 300px; height: 300px;
            background: var(--accent-color); filter: blur(120px); opacity: 0.1;
            top: 10%; left: 10%; z-index: -1;
        }
        .login-container {
            background-color: var(--container-bg); padding: 2.5rem; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); width: 100%; max-width: 550px;
            border: 1px solid var(--border-color); text-align: center; animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .footer { margin-top: 2rem; font-size: 0.75rem; color: #555; display: flex; justify-content: space-between; }
        .footer a { color: var(--accent-color); text-decoration: none; }
        .history-item {
            background-color: var(--input-bg); padding: 10px 12px; margin-bottom: 8px; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color);
        }
        .status-badge { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; background-color: #333; color: #aaa; }
        .status-success { background-color: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-failed { background-color: rgba(255, 77, 77, 0.2); color: var(--error-color); }
        #historyList::-webkit-scrollbar { width: 6px; }
        #historyList::-webkit-scrollbar-thumb { background-color: #444; border-radius: 3px; }
        #searchInput {
            background: none;
            font-family: inherit;
            padding: 0px 17px;
            height: 48px;
            border: 1px solid rgb(255, 255, 255, 0.2);
            color: var(--text-color);
            outline: none;
            border-radius: 50px;
            transition: border-radius 0.1s;
            font-size: 0.9rem;
            flex: 1;
            box-sizing: border-box;
        }
        #searchInput:focus {
            border: 1px solid rgba(253, 253, 253, 0.514);
            border-radius: 6px;
        }
        .search-container:focus-within > #searchBtn {
            border-radius: 6px;
        }
        #searchBtn {
            height: 48px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0 24px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-radius 0.1s, background-color 0.2s, transform 0.1s;
            box-sizing: border-box;
        }
        #searchBtn:hover {
            background-color: var(--accent-hover);
        }
        #searchBtn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Scramjet 登录日志</h1>
        <p>系统账号登录记录</p>

        <div class="search-container" style="display: flex; gap: 8px; margin-bottom: 1rem;">
            <input type="text" id="searchInput" placeholder="搜索用户名 / IP" autocomplete="off">
            <button id="searchBtn">搜索</button>
        </div>

        <div style="text-align: left;">
            <ul id="historyList" style="list-style: none; padding: 0; max-height: 400px; overflow-y: auto;">
                <li style="text-align: center; color: #888; font-size: 0.85rem;">加载中...</li>
            </ul>
        </div>

        <div class="footer">
            <a href="/admin.html">&larr; 返回账户管理</a>
            <a id="logoutLink" href="#" style="color: var(--error-color); cursor: pointer;">注销</a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        async function loadHistory(query = '') {
            try {
                const url = query ? `/api/login_history?q=${encodeURIComponent(query)}` : '/api/login_history';
                const res = await fetch(url);
                if (!res.ok) return;
                const data = await res.json();
                if (data.success && data.history) {
                    const list = document.getElementById('historyList');
                    list.innerHTML = '';
                    if (data.history.length === 0) {
                        list.innerHTML = '<li style="text-align: center; color: #888; font-size: 0.85rem;">暂无登录记录</li>';
                        return;
                    }

                    data.history.forEach(h => {
                        const li = document.createElement('li');
                        li.className = 'history-item';
                        
                        const statusClass = h.status === 'success' ? 'status-success' : 'status-failed';
                        const statusText = h.status === 'success' ? '成功' : '失败';
                        const timeText = new Date(h.login_time).toLocaleString();
                        const ipText = h.ip_address || '未知 IP';

                        li.innerHTML = `
                            <div style="display: flex; flex-direction: column; text-align: left; gap: 4px; width: 100%;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-weight: 500; font-size: 0.95rem;">${h.username}</span>
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; color: #888; font-size: 0.75rem;">
                                    <span>${timeText}</span>
                                    <span>${ipText}</span>
                                </div>
                            </div>
                        `;
                        list.appendChild(li);
                    });
                }
            } catch (err) {
                console.error("加载登录日志失败:", err);
            }
        }

        // Check if user is actually admin
        fetch('/api/me').then(res => {
            if (!res.ok) window.location.href = '/login.html';
            return res.json();
        }).then(data => {
            if (data.role !== 'admin') {
                document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:20vh;"><h2>403 Forbidden</h2><p>You do not have permission to view this page.</p></div>';
            } else {
                loadHistory();
            }
        }).catch(err => {
            window.location.href = '/login.html';
        });

        searchBtn.addEventListener('click', () => {
            loadHistory(searchInput.value.trim());
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loadHistory(searchInput.value.trim());
            }
        });

        document.getElementById('logoutLink').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (err) {
                console.error('Logout failed:', err);
            }
        });
    </script>
</body>
</html>
