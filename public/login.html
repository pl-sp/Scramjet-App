<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 | Scramjet</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --container-bg: #1a1a1f;
            --text-color: #e0e0e0;
            --accent-color: #5865f2; /* 经典的暗色模式蓝 */
            --accent-hover: #4752c4;
            --error-color: #ff4d4d;
            --input-bg: #25252b;
            --border-color: #33333a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 背景微光动效 */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(120px);
            opacity: 0.1;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .login-container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #aaa;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #message {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--error-color);
            min-height: 1.2rem;
            visibility: hidden;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Scramjet 访问控制</h1>
        <p>私有实例，请输入凭证以继续</p>

        <div class="form-group">
            <label for="user">用户名</label>
            <input type="text" id="user" placeholder="输入用户名" autocomplete="off">
        </div>

        <div class="form-group">
            <label for="pass">密码</label>
            <input type="password" id="pass" placeholder="输入访问密码">
        </div>

        <button id="loginBtn">验证并进入</button>
        
        <div id="message">身份验证失败，请重试</div>

        <div class="footer">
            Powered by MercuryWorkshop & Scramjet
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const userInp = document.getElementById('user');
        const passInp = document.getElementById('pass');
        const msg = document.getElementById('message');

        async function handleLogin() {
            const user = userInp.value;
            const pass = passInp.value;

            if (!user || !pass) {
                showError("请填写完整信息");
                return;
            }

            loginBtn.innerText = "验证中...";
            loginBtn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                if (response.ok) {
                    // 登录成功，重定向到主页
                    window.location.href = '/';
                } else {
                    showError("凭证错误，拒绝访问");
                }
            } catch (err) {
                showError("网络错误，请稍后再试");
            } finally {
                loginBtn.innerText = "验证并进入";
                loginBtn.disabled = false;
            }
        }

        function showError(text) {
            msg.innerText = text;
            msg.style.visibility = 'visible';
            // 简单的抖动反馈
            document.querySelector('.login-container').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.login-container').style.animation = 'shake 0.3s';
            }, 10);
        }

        loginBtn.addEventListener('click', handleLogin);

        // 支持回车键登录
        [userInp, passInp].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        });
    </script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</body>
</html>
